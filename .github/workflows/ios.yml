name: Build MoneyWIN IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |

          mkdir -p Payload/MoneyWIN.app

          echo "Fake IPA build"

          touch Payload/MoneyWIN.app/MoneyWIN

          zip -r MoneyWIN.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MoneyWIN-IPA
          path: MoneyWIN.ipa
